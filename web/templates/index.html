<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股量化选股系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                </div>
                <h1>量化选股</h1>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active" data-page="dashboard">
                    <span class="nav-icon"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
                    <span class="nav-text">概览</span>
                </li>
                <li class="nav-item" data-page="views">
                    <span class="nav-icon"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></span>
                    <span class="nav-text">选股视图</span>
                </li>
                <li class="nav-item" data-page="stocks">
                    <span class="nav-icon"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></span>
                    <span class="nav-text">股票列表</span>
                </li>
                <li class="nav-item" data-page="history">
                    <span class="nav-icon"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
                    <span class="nav-text">历史结果</span>
                </li>
                <li class="nav-item" data-page="ranking">
                    <span class="nav-icon"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span>
                    <span class="nav-text">排名</span>
                </li>
            </ul>
            <div class="sidebar-footer">
                <div class="scheduler-status" id="scheduler-status">
                    <span class="dot grey"></span> <span class="nav-text">调度器未启动</span>
                </div>
                <p class="nav-text">v2.0</p>
            </div>
        </nav>

        <main class="main-content">
            <header class="header">
                <h2 id="page-title">每日选股</h2>
                <div class="header-actions">
                    <span class="status-indicator" id="status-indicator">
                        <span class="dot green"></span> 就绪
                    </span>
                </div>
            </header>

            <div class="content">
                <!-- Dashboard -->
                <div id="dashboard-page" class="page active">
                    <div id="dashboard-ranking-list" class="ranking-list">
                        <p class="loading">加载中...</p>
                    </div>
                </div>

                <!-- Views -->
                <div id="views-page" class="page">
                    <div class="card">
                        <div class="card-header">
                            <h3>选股视图管理</h3>
                            <button class="btn btn-primary" onclick="showCreateViewModal()">
                                + 新建视图
                            </button>
                        </div>
                        <div id="views-list" class="views-grid">
                            <p class="loading">加载中...</p>
                        </div>
                    </div>

                    <div id="view-detail-section" class="card" style="display:none;">
                        <div class="card-header">
                            <h3 id="view-detail-title">编辑视图</h3>
                            <div class="header-actions">
                                <button class="btn btn-secondary" onclick="saveCurrentView()">
                                    保存参数
                                </button>
                                <button class="btn btn-success" onclick="runCurrentView()">
                                    执行选股
                                </button>
                            </div>
                        </div>

                        <div class="params-grid" id="view-params-form">
                        </div>

                        <div id="view-results" style="display:none;">
                            <h4 class="section-title">选股结果</h4>
                            <div id="view-results-content"></div>
                        </div>
                    </div>
                </div>

                <!-- Stocks -->
                <div id="stocks-page" class="page">
                    <div class="card">
                        <div class="card-header">
                            <h3>A股股票列表</h3>
                            <input type="text" id="stock-search" placeholder="搜索代码或名称..." class="search-input">
                        </div>
                        <div class="table-container">
                            <table class="data-table" id="stocks-table">
                                <thead>
                                    <tr>
                                        <th>代码</th>
                                        <th>名称</th>
                                        <th>最新价</th>
                                        <th>日期</th>
                                        <th>市值(亿)</th>
                                        <th>数据量</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="stocks-tbody">
                                    <tr><td colspan="7" class="loading">加载中...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- History -->
                <div id="history-page" class="page">
                    <div class="card">
                        <div class="card-header">
                            <h3>历史选股结果</h3>
                            <select id="history-view-select" class="select-input" onchange="loadHistory()">
                                <option value="">选择视图...</option>
                            </select>
                        </div>
                        <div id="history-list">
                            <p class="placeholder">请先选择一个视图</p>
                        </div>
                    </div>
                </div>

                <!-- Ranking -->
                <div id="ranking-page" class="page">
                    <div class="card">
                        <div class="card-header">
                            <h3>每日选股排名</h3>
                        </div>
                        <div id="ranking-list" class="ranking-list">
                            <p class="loading">加载中...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Create View Modal -->
    <div id="create-view-modal" class="modal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>新建选股视图</h3>
                <button class="close-btn" onclick="closeCreateViewModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>视图名称</label>
                    <input type="text" id="new-view-name" placeholder="例如：激进策略" class="form-input">
                </div>
                <div class="form-group">
                    <label>基于已有视图</label>
                    <select id="new-view-source" class="form-input">
                        <option value="">使用默认参数</option>
                    </select>
                </div>
                <button class="btn btn-primary btn-block" onclick="createView()">创建</button>
            </div>
        </div>
    </div>

    <!-- Stock Detail Modal -->
    <div id="stock-modal" class="modal">
        <div class="modal-content modal-lg">
            <div class="kline-header">
                <div class="kline-header-left">
                    <span class="kline-stock-code" id="modal-stock-code">000001</span>
                    <span class="kline-stock-name" id="modal-stock-name">--</span>
                    <span class="kline-stock-price" id="modal-stock-price"></span>
                </div>
                <div class="kline-header-right">
                    <div class="kline-tabs" id="kline-tabs">
                        <button class="kline-tab active" data-period="daily" onclick="switchKlinePeriod('daily')">日K</button>
                        <button class="kline-tab" data-period="weekly" onclick="switchKlinePeriod('weekly')">周K</button>
                    </div>
                    <button class="close-btn" onclick="closeStockModal()">&times;</button>
                </div>
            </div>
            <div class="kline-body">
                <div id="kline-chart-wrap" style="position:relative;width:100%;">
                    <div id="kline-ol-main" class="kline-overlay"></div>
                    <div id="kline-ol-vol" class="kline-overlay"></div>
                    <div id="kline-ol-kdj" class="kline-overlay"></div>
                    <div id="kline-chart" style="width:100%;height:560px;"></div>
                    <div id="weekly-line-toggle" style="display:none;"></div>
                </div>
            </div>
            <div class="kline-nav-bar" id="kline-nav-bar" style="display:none">
                <button class="kline-nav-fab" id="nav-prev-btn" onclick="navigateStock(-1)">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <span class="kline-nav-info" id="nav-info">1/10</span>
                <button class="kline-nav-fab" id="nav-next-btn" onclick="navigateStock(1)">
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
