name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR="/opt/a-share-quant"
            REPO="https://github.com/${{ github.repository }}.git"

            # First-time setup: clone repo (preserve config)
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo ">>> First deploy: initializing git repo"
              # Backup config if exists
              [ -d "$DEPLOY_DIR/config" ] && cp -r "$DEPLOY_DIR/config" /tmp/_quant_cfg_bak

              rm -rf "$DEPLOY_DIR"
              git clone --depth 1 "$REPO" "$DEPLOY_DIR"

              # Restore config
              if [ -d "/tmp/_quant_cfg_bak" ]; then
                cp -r /tmp/_quant_cfg_bak/* "$DEPLOY_DIR/config/" 2>/dev/null || true
                rm -rf /tmp/_quant_cfg_bak
              fi
            else
              echo ">>> Pulling latest code"
              cd "$DEPLOY_DIR"
              git fetch origin main
              git reset --hard origin/main
            fi

            cd "$DEPLOY_DIR"
            echo ">>> Building and restarting containers"
            docker compose up -d --build --remove-orphans

            echo ">>> Waiting for service to be ready..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:18321/api/stats > /dev/null 2>&1; then
                echo ">>> Deploy successful! (ready after ~${i}0s)"
                exit 0
              fi
              echo "  waiting... ($i/12)"
              sleep 10
            done
            echo ">>> WARNING: Service not responding after 120s"
            docker compose logs --tail 30
            exit 1
