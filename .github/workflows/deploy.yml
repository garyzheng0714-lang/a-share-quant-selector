name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            DEPLOY_DIR="/opt/a-share-quant"
            REPO="https://github.com/${{ github.repository }}.git"

            # GitHub mirror proxies for China ECS
            MIRRORS=(
              "https://ghfast.top/"
              "https://ghproxy.cc/"
              "https://github.moeyy.xyz/"
            )

            fetch_with_retry() {
              local dir="$1" repo="$2"
              cd "$dir"

              # Try direct first (short timeout)
              echo ">>> Trying direct GitHub..."
              if git fetch origin main --depth 1 2>/dev/null; then
                return 0
              fi

              # Try mirrors
              for mirror in "${MIRRORS[@]}"; do
                echo ">>> Trying mirror: ${mirror}"
                git remote set-url origin "${mirror}${repo#https://}"
                if git fetch origin main --depth 1 2>/dev/null; then
                  git remote set-url origin "$repo"
                  return 0
                fi
              done

              git remote set-url origin "$repo"
              return 1
            }

            # First-time setup: clone repo (preserve config)
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo ">>> First deploy: initializing git repo"
              [ -d "$DEPLOY_DIR/config" ] && cp -r "$DEPLOY_DIR/config" /tmp/_quant_cfg_bak

              rm -rf "$DEPLOY_DIR"
              CLONED=false
              for mirror in "" "${MIRRORS[@]}"; do
                CLONE_URL="${mirror}${REPO#https://}"
                [ -z "$mirror" ] && CLONE_URL="$REPO"
                echo ">>> Trying clone from: ${CLONE_URL}"
                if git clone --depth 1 "$CLONE_URL" "$DEPLOY_DIR" 2>/dev/null; then
                  cd "$DEPLOY_DIR" && git remote set-url origin "$REPO"
                  CLONED=true
                  break
                fi
                rm -rf "$DEPLOY_DIR"
              done
              $CLONED || { echo ">>> All mirrors failed"; exit 1; }

              if [ -d "/tmp/_quant_cfg_bak" ]; then
                cp -r /tmp/_quant_cfg_bak/* "$DEPLOY_DIR/config/" 2>/dev/null || true
                rm -rf /tmp/_quant_cfg_bak
              fi
            else
              echo ">>> Pulling latest code"
              GIT_HTTP_LOW_SPEED_LIMIT=1000 GIT_HTTP_LOW_SPEED_TIME=15 \
                fetch_with_retry "$DEPLOY_DIR" "$REPO" || { echo ">>> All fetch attempts failed"; exit 1; }
              git reset --hard origin/main
            fi

            cd "$DEPLOY_DIR"
            echo ">>> Building and restarting containers"
            docker compose up -d --build --remove-orphans

            echo ">>> Waiting for service to be ready..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:18321/api/stats > /dev/null 2>&1; then
                echo ">>> Deploy successful! (ready after ~${i}0s)"
                exit 0
              fi
              echo "  waiting... ($i/12)"
              sleep 10
            done
            echo ">>> WARNING: Service not responding after 120s"
            docker compose logs --tail 30
            exit 1
