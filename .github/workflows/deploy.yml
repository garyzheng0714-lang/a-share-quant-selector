name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            DEPLOY_DIR="/opt/a-share-quant"
            REPO="https://github.com/${{ github.repository }}.git"

            # First-time setup: clone repo (preserve config)
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo ">>> First deploy: initializing git repo"
              # Backup config if exists
              [ -d "$DEPLOY_DIR/config" ] && cp -r "$DEPLOY_DIR/config" /tmp/_quant_cfg_bak

              rm -rf "$DEPLOY_DIR"
              git clone --depth 1 "$REPO" "$DEPLOY_DIR"

              # Restore config
              if [ -d "/tmp/_quant_cfg_bak" ]; then
                cp -r /tmp/_quant_cfg_bak/* "$DEPLOY_DIR/config/" 2>/dev/null || true
                rm -rf /tmp/_quant_cfg_bak
              fi
            else
              echo ">>> Pulling latest code"
              cd "$DEPLOY_DIR"
              git fetch origin main
              git reset --hard origin/main
            fi

            cd "$DEPLOY_DIR"
            echo ">>> Building and restarting containers"
            docker compose up -d --build --remove-orphans

            echo ">>> Waiting for health check..."
            sleep 5
            if docker compose ps | grep -q "healthy\|running"; then
              echo ">>> Deploy successful!"
            else
              echo ">>> WARNING: Container may not be healthy"
              docker compose logs --tail 20
              exit 1
            fi
